spring.application.name=ticket-triage-service
server.port=8081

# MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/ticketing}
spring.data.mongodb.auto-index-creation=true

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=ticket-triage-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.ticketing.*

app.kafka.topic.tickets-created=tickets.created
app.kafka.topic.tickets-critical=tickets.critical
app.kafka.topic.tickets-medium=tickets.medium
app.kafka.topic.tickets-low=tickets.low
app.kafka.topic.tickets-dlq=tickets.dlq

# Google Gemini via Spring AI
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash
spring.ai.google.genai.chat.options.temperature=0.2
